/* ═══════════════════════════════════════════════════════════════
   STORAGE SHIM — replaces window.storage (Claude artifact API)
   with localStorage so data persists permanently in the browser
═══════════════════════════════════════════════════════════════ */
window.storage = {
  get: async (key) => {
    try {
      const val = localStorage.getItem('safwai_' + key);
      if (val === null) throw new Error('Not found');
      return { key, value: val, shared: false };
    } catch(e) { throw e; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem('safwai_' + key, value);
      return { key, value, shared: false };
    } catch(e) { throw e; }
  },
  delete: async (key) => {
    localStorage.removeItem('safwai_' + key);
    return { key, deleted: true, shared: false };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage)
      .filter(k => k.startsWith('safwai_' + (prefix || '')))
      .map(k => k.replace('safwai_', ''));
    return { keys, prefix, shared: false };
  }
};
</script>

/* ═══════════════════════════════════════════════════════════════
   STORAGE HELPERS
═══════════════════════════════════════════════════════════════ */
async function sGet(key, fallback) {
  try { const r = await window.storage.get(key); if (r?.value) return JSON.parse(r.value); } catch {}
  return fallback;
}
async function sSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val)); } catch(e) { console.error(e); }
}
function parseJ(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch { return null; }
}
function getApiKey() {
  return localStorage.getItem('safwai-api-key') || '';
}
async function apiCall(model, system, user, tokens=800) {
  const key = getApiKey();
  if (!key) throw new Error('NO_KEY');
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model, max_tokens:tokens, system, messages:[{role:"user",content:user}] })
  });
  if (!r.ok) throw new Error(`API ${r.status}`);
  const d = await r.json();
  return d.content?.[0]?.text?.trim() || '';
}

/* ═══════════════════════════════════════════════════════════════
   DOHA CLOCK
═══════════════════════════════════════════════════════════════ */
function DohaClock() {
  const [t, setT] = useState({time:'--:--:--', date:''});
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      const d = new Date(n.toLocaleString('en-US',{timeZone:'Asia/Qatar'}));
      setT({
        time: `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`,
        date: d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',timeZone:'Asia/Qatar'})
      });
    };
    tick(); const id = setInterval(tick,1000); return ()=>clearInterval(id);
  },[]);
  return (
    <div style={{marginLeft:'auto',textAlign:'right',flexShrink:0}}>
      <div style={{fontFamily:'var(--fm)',fontSize:'15px',color:'var(--accent)',letterSpacing:'1px',lineHeight:1}}>{t.time}</div>
      <div style={{fontFamily:'var(--fm)',fontSize:'8px',color:'var(--text-muted)',letterSpacing:'.5px',marginTop:'1px'}}>DOHA · AST · UTC+3 · {t.date}</div>
    </div>
  );
}

function KanbanTab({kanban, setKanban, contacts, opps, setPreviousTab, setDetail, setEditing}) {
  const [addingTo, setAddingTo] = useState(null);
  const [newCard, setNewCard] = useState({title:'',theme:'pipeline',priority:'medium',notes:'',contactId:'',oppId:''});

  const saveKanban = async (kb) => { setKanban(kb); await sSet(SK.kanban, kb); };
  const moveCard = async (id, toCol) => {
    const updated = kanban.map(c => c.id===id ? {...c, col:toCol, doneAt: toCol==='done' ? new Date().toISOString() : c.doneAt} : c);
    await saveKanban(updated);
  };
  const deleteCard = async (id) => { await saveKanban(kanban.filter(c=>c.id!==id)); };

  const themeColor = {
    pipeline: '#c85a18',   // orange — pipeline/sales
    marketing: '#155878',  // blue — marketing/content
    project: '#1e6e30',    // green — internal projects
    personal: '#8a5e08',   // gold — personal
    followup: '#8a1a1a',   // deep red — follow-ups
  };
  const themeBg = {
    pipeline: 'rgba(200,90,24,.06)',
    marketing: 'rgba(21,88,120,.06)',
    project: 'rgba(30,110,48,.06)',
    personal: 'rgba(138,94,8,.06)',
    followup: 'rgba(138,26,26,.06)',
  };
  const prioColor = {critical:'#c85a18',high:'#c8903a',medium:'#1e6e30',low:'#8a7a6a'};

  const doAdd = async () => {
    if (!newCard.title.trim()) return;
    const card = {...newCard, id:'k'+Date.now(), col:addingTo, createdAt:new Date().toISOString()};
    await saveKanban([...kanban, card]);
    setNewCard({title:'',theme:'pipeline',priority:'medium',notes:'',contactId:'',oppId:''});
    setAddingTo(null);
  };

  const activeDone = kanban.filter(c=>c.col==='done'&&(!c.doneAt||Date.now()-new Date(c.doneAt)<7*86400000));

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{padding:'10px 16px 6px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'6px'}}>
        <div className="section-title" style={{marginBottom:0}}>Actions <span>{kanban.filter(c=>c.col!=='done').length} open</span></div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
          {Object.entries(themeColor).map(([theme,color])=>(
            <div key={theme} style={{display:'flex',alignItems:'center',gap:'3px'}}>
              <div style={{width:'8px',height:'8px',borderRadius:'50%',background:color,flexShrink:0}}/>
              <span style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--text-muted)',textTransform:'capitalize'}}>{theme}</span>
            </div>
          ))}
          <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--text-muted)',marginLeft:'4px'}}>scroll →</div>
        </div>
      </div>
      <div className="kanban-wrap">
        {KANBAN_COLS.map(col=>{
          const colCards = col==='done' ? activeDone : kanban.filter(c=>c.col===col);
          const colColor = KANBAN_COL_COLORS[col];
          return (
            <div key={col} className="kanban-col">
              <div className="kanban-col-hdr" style={{background:colColor+'18',border:`1px solid ${colColor}44`}}>
                <span className="kanban-col-title" style={{color:colColor}}>{KANBAN_COL_LABELS[col]}</span>
                <span className="kanban-col-count" style={{color:colColor}}>{colCards.length}</span>
              </div>

              {colCards.map(card=>{
                const linkedContact = card.contactId ? contacts.find(c=>c.id===card.contactId) : null;
                const linkedOpp = card.oppId ? opps.find(o=>o.id===card.oppId) : null;
                const colIdx = KANBAN_COLS.indexOf(col);
                const prevCol = colIdx > 0 ? KANBAN_COLS[colIdx-1] : null;
                const nextCol = colIdx < KANBAN_COLS.length-1 ? KANBAN_COLS[colIdx+1] : null;
                return (
                  <div key={card.id} className={`kanban-card ${col==='done'?'done-card':''}`}
                    style={{borderLeft:`3px solid ${themeColor[card.theme]||'var(--border)'}`,background:col==='done'?'var(--surface)':themeBg[card.theme]||'var(--surface)'}}>
                    <div className="kc-prio" style={{background:prioColor[card.priority]||'var(--text-muted)'}}/>
                    <div className="kc-theme" style={{color:themeColor[card.theme]||'var(--text-muted)'}}>{card.theme}</div>
                    <div className="kc-title">{card.title}</div>
                    {linkedContact&&<div className="kc-link" onClick={()=>{setPreviousTab('kanban');setDetail({type:'contact',item:linkedContact});setEditing(false);}}>👤 {linkedContact.name}</div>}
                    {linkedOpp&&<div className="kc-link" onClick={()=>{setPreviousTab('kanban');setDetail({type:'opp',item:linkedOpp});setEditing(false);}}>💼 {linkedOpp.name}</div>}
                    {card.notes&&<div className="kc-notes">{card.notes}</div>}
                    <div className="kc-actions">
                      {nextCol&&<button className="kc-btn primary" onClick={()=>moveCard(card.id,nextCol)}>→ {KANBAN_COL_LABELS[nextCol]}</button>}
                      {prevCol&&<button className="kc-btn" onClick={()=>moveCard(card.id,prevCol)}>← Back</button>}
                      <button className="kc-btn" onClick={()=>deleteCard(card.id)} style={{marginLeft:'auto',color:'var(--red)',borderColor:'transparent'}}>✕</button>
                    </div>
                  </div>
                );
              })}

              {addingTo===col ? (
                <div className="kanban-add-form">
                  <input className="ka-input" placeholder="What needs to happen?" autoFocus
                    value={newCard.title} onChange={e=>setNewCard({...newCard,title:e.target.value})}
                    onKeyDown={e=>e.key==='Enter'&&doAdd()}/>
                  <div className="ka-row">
                    <select className="ka-select" value={newCard.theme} onChange={e=>setNewCard({...newCard,theme:e.target.value})}>
                      <option value="pipeline">Pipeline</option>
                      <option value="followup">Follow-up</option>
                      <option value="marketing">Marketing</option>
                      <option value="project">Project</option>
                      <option value="personal">Personal</option>
                    </select>
                    <select className="ka-select" value={newCard.priority} onChange={e=>setNewCard({...newCard,priority:e.target.value})}>
                      <option value="critical">Critical</option>
                      <option value="high">High</option>
                      <option value="medium">Medium</option>
                      <option value="low">Low</option>
                    </select>
                  </div>
                  <select className="ka-select" value={newCard.contactId} onChange={e=>setNewCard({...newCard,contactId:e.target.value})}>
                    <option value="">No contact</option>
                    {contacts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <select className="ka-select" value={newCard.oppId} onChange={e=>setNewCard({...newCard,oppId:e.target.value})}>
                    <option value="">No opportunity</option>
                    {opps.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
                  </select>
                  <input className="ka-input" placeholder="Notes (optional)"
                    value={newCard.notes} onChange={e=>setNewCard({...newCard,notes:e.target.value})}/>
                  <div className="ka-row">
                    <button className="save-btn" style={{flex:1,padding:'7px'}} onClick={doAdd}>+ Add</button>
                    <button className="cancel-btn" style={{padding:'7px 12px'}} onClick={()=>setAddingTo(null)}>✕</button>
                  </div>
                </div>
              ) : (
                col !== 'done' && <button className="kanban-add" onClick={()=>setAddingTo(col)}>+ Add action</button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
function AddProjectInput({onAdd}) {

      <input className="minput" value={val} onChange={e=>setVal(e.target.value)}

function SAFWAISidekick() {
  const [tab, setTab]           = useState('coach');

  const [projects, setProjects] = useState([]);
  const [interactions, setInteractions] = useState([]);
  const [kanban, setKanban] = useState([]);

  const [showAddContact, setShowAddContact] = useState(false);
  const [newContactData, setNewContactData] = useState({name:'',company:'',role:'',geography:'',priority:'medium',relationship:'',nextAction:'',notes:''});
  const [showAddOpp, setShowAddOpp] = useState(false);
  const [newOppData, setNewOppData] = useState({name:'',proposition:'',geography:'',stage:'1 - Prospect',probability:10,cltv:0,expectedValue:0,whereIsBall:'Ball in our court',nextAction:'',notes:''});
  const [logMode, setLogMode]   = useState('manual');
  const [logType, setLogType]   = useState('call');
  const [logText, setLogText]   = useState('');
  const [logLoading, setLogLoading] = useState(false);
  const [logStatus, setLogStatus] = useState('');
  const [newMem, setNewMem]     = useState('');
  const [importText, setImportText] = useState('');
  const [importing, setImporting] = useState(false);
  const [importRes, setImportRes] = useState(null);
  const [orchInput, setOrchInput] = useState('');
  const [orchSrc, setOrchSrc]   = useState('whatsapp');
  const [orching, setOrching]   = useState(false);
  const [orchAgents, setOrchAgents] = useState([]);
  const [orchResult, setOrchResult] = useState(null);
  const [savedChats, setSavedChats] = useState({coach:[],taskbreaker:[],braindump:[]});
  const [pendingActivity, setPendingActivity] = useState(null); // {description, contactName, type}
  const bottomRef = useRef(null);
  const taRef     = useRef(null);

  // Load all data on mount
  useEffect(() => {
    Promise.all([
      sGet(SK.memory, []),
      sGet(SK.contacts, SEED_C),
      sGet(SK.opps, SEED_O),
      sGet(SK.log, []),
      sGet(SK.projects, SEED_PROJECTS),
      sGet(SK.interactions, []),
      sGet(SK.chats, {coach:[], taskbreaker:[], braindump:[]}),
      sGet(SK.kanban, SEED_KANBAN)
    ]).then(([m,c,o,l,p,ix,ch,kb]) => {
      setMemories(Array.isArray(m)?m:[]);
      setContacts(Array.isArray(c)?c:SEED_C);
      setOpps(Array.isArray(o)?o:SEED_O);
      setOrchLog(Array.isArray(l)?l:[]);
      setProjects(Array.isArray(p)?p:SEED_PROJECTS);
      setInteractions(Array.isArray(ix)?ix:[]);
      const savedChats = ch && typeof ch === 'object' ? ch : {coach:[],taskbreaker:[],braindump:[]};
      setSavedChats(savedChats);
      setMessages(Array.isArray(savedChats.coach) ? savedChats.coach : []);
      setKanban(Array.isArray(kb)?kb:SEED_KANBAN);
      setLoaded(true);
    });
  }, []);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, loading, memToast, orchToast]);

  const resize = () => {
    if (!taRef.current) return;
    taRef.current.style.height = 'auto';
    taRef.current.style.height = Math.min(taRef.current.scrollHeight, window.innerHeight * 0.6) + 'px';
  };

  // ── SAVE chat history to storage
  const saveChat = async (mode, msgs) => {
    const updated = {...savedChats, [mode]: msgs.slice(-50)}; // keep last 50 messages per mode
    setSavedChats(updated);
    await sSet(SK.chats, updated);
  };

  // ── QUICK LOG ACTIVITY from coach conversation
  const quickLogActivity = async (description, contactName, type='note') => {
    const contactIdx = contacts.findIndex(c =>
      contactName && (c.name.toLowerCase().includes(contactName.toLowerCase().split(' ')[0]) ||
      contactName.toLowerCase().includes(c.name.toLowerCase().split(' ')[0]))
    );
    const contactId = contactIdx >= 0 ? contacts[contactIdx].id : null;
    const ix = {
      id: Date.now() + Math.random(),
      type, date: new Date().toISOString(),
      summary: description,
      sentiment: 'neutral', keyInsights: [], nextAction: '',
      contactIds: contactId ? [contactId] : [],
      oppIds: [], source: 'manual-from-coach'
    };
    const updatedIx = [ix, ...interactions].slice(0, 5000);
    setInteractions(updatedIx);
    await sSet(SK.interactions, updatedIx);
    if (contactIdx >= 0) {
      const updatedContacts = contacts.map((c,i) => i !== contactIdx ? c : {
        ...c,
        lastContact: new Date().toISOString().split('T')[0],
        interactionIds: [ix.id, ...(c.interactionIds||[])]
      });
      setContacts(updatedContacts);
      await sSet(SK.contacts, updatedContacts);
    }
    setPendingActivity(null);
    setOrchToast(`◉ Activity logged${contactName ? ': ' + contactName : ''}`);
    setTimeout(() => setOrchToast(''), 3000);
  };

  // ── BACKGROUND ORCHESTRATION after each coach exchange
  const backgroundOrch = async (userMsg, assistantMsg, currentMems, currentContacts, currentOpps) => {
    try {
      // 1. Memory extraction (Haiku)
      const memRaw = await apiCall(M.fast, MEMORY_EXTRACTOR_P,
        `Existing memories:\n${currentMems.slice(-10).map(m=>`- ${m.text}`).join('\n')||'None'}\n\nExchange:\nUser: ${userMsg}\nCoach: ${assistantMsg}`, 600);
      const newMemTexts = parseJ(memRaw) || [];

      // 2. CRM contact scan (Haiku) — AI extracts names, JS does matching
      const crmRaw = await apiCall(M.fast, CRM_SCANNER_P,
        `Exchange:\nUser: ${userMsg}\nCoach: ${assistantMsg}`, 1000);
      const crmPlan = parseJ(crmRaw);

      // Local JS matching — zero tokens, instant, scales to any size
      const isKnownContact = (name) => currentContacts.some(c =>
        c.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]) ||
        name.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
      );
      const isKnownOpp = (name) => opps.some(o =>
        o.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]) ||
        name.toLowerCase().includes(o.name.toLowerCase().split(' ')[0])
      );

      // Filter to only truly unknown names/opps — exclude self
      const SELF_NAME = 'jeroen';
      const unknownNames = (crmPlan?.allNamesDetected||[]).filter(n => !isKnownContact(n) && !n.toLowerCase().includes(SELF_NAME));
      const unknownOpps  = (crmPlan?.allOppsDetected||[]).filter(o => !isKnownOpp(o));

      // Inject back for downstream use
      if (crmPlan) {
        crmPlan.unknownNames = unknownNames;
        crmPlan.unknownOpportunities = unknownOpps;
      }

      let updatedMems = currentMems;
      let updatedContacts = currentContacts;
      let crmChanged = false;

      // Save memories
      if (newMemTexts.length > 0) {
        const entries = newMemTexts
          .map(item => typeof item === 'string' ? item.trim() : typeof item === 'object' && item !== null ? (item.text||JSON.stringify(item)) : String(item))
          .filter(Boolean)
          .map(text => ({ id: Date.now() + Math.random(), text, timestamp: new Date().toISOString(), agent: 'coach' }));
        updatedMems = [...currentMems, ...entries];
        setMemories(updatedMems);
        await sSet(SK.memory, updatedMems);
        setMemToast(true);
        setTimeout(() => setMemToast(false), 3000);
      }

      // Update CRM contacts + log real-world activities
      if (crmPlan?.hasUpdates) {
        updatedContacts = [...currentContacts];
        let updatedIx = [...interactions];
        let updatedOpps = [...opps];
        let updatedProjs = [...projects];
        let toastParts = [];

        // Contact updates
        for (const cu of (crmPlan.contactUpdates||[])) {
          const idx = updatedContacts.findIndex(c =>
            c.name.toLowerCase().includes(cu.contactName.toLowerCase().split(' ')[0]) ||
            cu.contactName.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
          );
          if (idx >= 0) {
            updatedContacts[idx] = {
              ...updatedContacts[idx],
              lastContact: new Date().toISOString().split('T')[0],
              nextAction: cu.nextAction || updatedContacts[idx].nextAction,
            };
            crmChanged = true;
          }
        }

        // Real-world activities — log to global interactions store
        for (const act of (crmPlan.realWorldActivities||[])) {
          const contactIdx = updatedContacts.findIndex(c =>
            c.name.toLowerCase().includes(act.contactName.toLowerCase().split(' ')[0]) ||
            act.contactName.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
          );
          const contactId = contactIdx >= 0 ? updatedContacts[contactIdx].id : null;
          const ix = {
            id: Date.now() + Math.random(),
            type: act.type || 'note',
            date: new Date().toISOString(),
            summary: act.summary,
            sentiment: act.sentiment || 'neutral',
            keyInsights: [],
            nextAction: act.nextAction || '',
            contactIds: contactId ? [contactId] : [],
            oppIds: [],
            source: 'auto-detected'
          };
          updatedIx = [ix, ...updatedIx].slice(0, 5000);
          if (contactIdx >= 0) {
            updatedContacts[contactIdx] = {
              ...updatedContacts[contactIdx],
              lastContact: new Date().toISOString().split('T')[0],
              nextAction: act.nextAction || updatedContacts[contactIdx].nextAction,
              interactionIds: [ix.id, ...(updatedContacts[contactIdx].interactionIds || [])]
            };
            crmChanged = true;
          }
          toastParts.push(`activity logged: ${act.contactName}`);
        }

        // If scanner detected activities but couldn't auto-log (no matching contact),
        // surface a pre-filled confirmation card for the user
        const unmatched = (crmPlan.realWorldActivities||[]).filter(act => {
          return !updatedContacts.find(c =>
            c.name.toLowerCase().includes(act.contactName.toLowerCase().split(' ')[0]) ||
            act.contactName.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
          );
        });
        if (unmatched.length > 0) {
          const first = unmatched[0];
          setPendingActivity({description: first.summary, contactName: first.contactName, type: first.type||'note'});
        }

        // Pipeline opportunity updates
        for (const ou of (crmPlan.opportunityUpdates||[])) {
          const idx = updatedOpps.findIndex(o =>
            o.name.toLowerCase().includes(ou.oppName.toLowerCase().split(' ')[0]) ||
            ou.oppName.toLowerCase().includes(o.name.toLowerCase().split(' ')[0])
          );
          if (idx >= 0) {
            updatedOpps[idx] = {
              ...updatedOpps[idx],
              stage: ou.stageUpdate || updatedOpps[idx].stage,
              nextAction: ou.nextAction || updatedOpps[idx].nextAction,
              notes: ou.notes ? updatedOpps[idx].notes + '\n\n' + new Date().toLocaleDateString('en-GB') + ': ' + ou.notes : updatedOpps[idx].notes
            };
            toastParts.push(`pipeline: ${ou.oppName}`);
          }
        }

        // Project updates
        for (const pu of (crmPlan.projectUpdates||[])) {
          const idx = updatedProjs.findIndex(p =>
            p.name.toLowerCase().includes(pu.projectName.toLowerCase().split(' ')[0]) ||
            pu.projectName.toLowerCase().includes(p.name.toLowerCase().split(' ')[0])
          );
          if (idx >= 0) {
            updatedProjs[idx] = {
              ...updatedProjs[idx],
              status: pu.statusUpdate || updatedProjs[idx].status,
              nextAction: pu.nextAction || updatedProjs[idx].nextAction,
              notes: pu.notes ? updatedProjs[idx].notes + ' · ' + pu.notes : updatedProjs[idx].notes
            };
            toastParts.push(`project: ${pu.projectName}`);
          }
        }

        // Save all updated state
        if (crmChanged || toastParts.length > 0) {
          setContacts(updatedContacts);
          setInteractions(updatedIx);
          setOpps(updatedOpps);
          setProjects(updatedProjs);
          await sSet(SK.contacts, updatedContacts);
          await sSet(SK.interactions, updatedIx);
          await sSet(SK.opps, updatedOpps);
          await sSet(SK.projects, updatedProjs);
          const toast = toastParts.length > 0 ? toastParts.join(' · ') : `contacts updated`;
          setOrchToast(`◉ ${toast}`);
          setTimeout(() => setOrchToast(''), 5000);
        }
      }

      // Suggest adding unknown names as contacts
      if (crmPlan?.unknownNames?.length > 0) {
        setNewContactSuggestion({ names: crmPlan.unknownNames });
      }

      // Suggest adding unknown opportunities
      if (crmPlan?.unknownOpportunities?.length > 0) {
        setNewOppSuggestion({ name: crmPlan.unknownOpportunities[0] });
      }

      // Save extra memories from CRM scan
      if (crmPlan?.memories?.length > 0) {
        const extras = crmPlan.memories.map(text => ({
          id: Date.now() + Math.random(),
          text, timestamp: new Date().toISOString(), agent: 'crm-scan'
        }));
        const finalMems = [...updatedMems, ...extras];
        setMemories(finalMems);
        await sSet(SK.memory, finalMems);
      }

    } catch(e) { console.error('Background orch error:', e); }
  };

  // ── SEND — auto-routes to right agent via orchestrator
  const send = async (text) => {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    const userMsg = {role:'user', content:msg};
    const history = [...messages, userMsg];
    setMessages(history);
    setInput('');
    if (taRef.current) taRef.current.style.height = 'auto';
    setLoading(true);

    try {
      // 1. Route to correct agent (fast, Haiku)
      let route = 'coach';
      try {
        const routeRaw = await apiCall(M.fast, ROUTER_P, msg, 10);
        const r = routeRaw.trim().toLowerCase();
        if (['coach','taskbreaker','braindump'].includes(r)) route = r;
      } catch {}
      setCoachMode(route);

      // 2. Build prompt for routed agent
      const prompt = buildCoachPrompt(memories, route);
      const reply = await apiCall(M.main, prompt, history.map(m=>`${m.role==='user'?'User':'Coach'}: ${m.content}`).join('\n\n'), 1000);
      const final = [...history, {role:'assistant', content:reply}];
      setMessages(final);
      saveChat('coach', final); // always save under 'coach' key — single conversation
      // Background orchestration — non-blocking
      backgroundOrch(msg, reply, memories, contacts, opps);
    } catch(e) {
      const msg = e.message === 'NO_KEY'
        ? '⚠ No API key set. Go to 🧠 Memory tab to add your Anthropic API key.'
        : `Connection issue (${e.message}). Try again.`;
      setMessages([...history, {role:'assistant', content:msg}]);
    } finally { setLoading(false); }
  };

  const onKey = e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } };

  // ── CENTRAL INTERACTION SAVER
  // Stores interaction as a global entity, updates contact interactionIds reference
  const saveInteraction = async (interaction, contactId, oppId = null, currentContacts, currentInteractions) => {
    const ix = {
      ...interaction,
      contactIds: contactId ? [contactId] : [],
      oppIds: oppId ? [oppId] : [],
    };
    const updatedIx = [ix, ...currentInteractions].slice(0, 5000);
    setInteractions(updatedIx);
    await sSet(SK.interactions, updatedIx);

    // Update contact: add interactionId ref, update lastContact + nextAction
    // Keep backward compat: don't embed full interaction, just reference
    const updatedContacts = currentContacts.map(c => {
      if (c.id !== contactId) return c;
      return {
        ...c,
        lastContact: new Date().toISOString().split('T')[0],
        nextAction: interaction.nextAction || c.nextAction,
        interactionIds: [ix.id, ...(c.interactionIds || [])],
        // Notes update if situation changed
        notes: interaction.contactUpdate
          ? c.notes + '\n\n' + new Date().toLocaleDateString('en-GB') + ': ' + interaction.contactUpdate
          : c.notes
      };
    });
    return { updatedContacts, updatedIx };
  };

  // ── LOG INTERACTION on contact detail
  const logInteraction = async () => {
    if (!logText.trim() || logLoading || !detail) return;
    setLogLoading(true); setLogStatus('Processing...');
    let extracted = null;

    if (logMode === 'paste') {
      try {
        const raw = await apiCall(M.fast,
          `Extract CRM update from content. Return ONLY JSON: {"summary":"2-3 sentences","sentiment":"positive|neutral|negative|mixed","keyInsights":["insight"],"nextAction":"action","contactUpdate":"situation update or null"}`,
          `Contact: ${detail.item.name}\nContent:\n${logText}`, 600);
        extracted = parseJ(raw);
      } catch {}
    }

    const ix = {
      id: Date.now() + Math.random(),
      type: logType,
      date: new Date().toISOString(),
      mode: logMode,
      summary: extracted?.summary || logText,
      sentiment: extracted?.sentiment || 'neutral',
      keyInsights: extracted?.keyInsights || [],
      nextAction: extracted?.nextAction || '',
      contactUpdate: extracted?.contactUpdate || null,
      source: 'manual-log'
    };

    const { updatedContacts } = await saveInteraction(ix, detail.item.id, null, contacts, interactions);
    setContacts(updatedContacts);
    await sSet(SK.contacts, updatedContacts);
    setDetail({...detail, item: updatedContacts.find(c => c.id === detail.item.id)});
    setLogText(''); setLogStatus('◉ Logged.'); setTimeout(() => setLogStatus(''), 3000);
    setLogLoading(false);
  };

  // ── FULL ORCHESTRATOR (Inbox tab)
  const runOrch = async () => {
    if (!orchInput.trim() || orching) return;
    setOrching(true); setOrchResult(null);
    const ags = [
      {label:'ORCHESTRATOR',detail:'Reading + routing...',status:'running',model:'Sonnet 4.6'},
      {label:'MEMORY AGENT',detail:'Waiting...',status:'waiting',model:'Haiku 4.5'},
      {label:'CRM AGENT',detail:'Waiting...',status:'waiting',model:'Haiku 4.5'},
    ];
    setOrchAgents([...ags]);

    try {
      const recentMems = memories.slice(-10).map(m=>`- ${m.text}`).join('\n');

      const planRaw = await apiCall(M.main, ORCHESTRATOR_P,
        `Source: ${orchSrc}\nContent:\n${orchInput}\n\nRecent memories:\n${recentMems}`, 1500);
      const plan = parseJ(planRaw);
      if (!plan) throw new Error('Orchestrator returned invalid JSON.');

      // Local JS matching — AI extracts names, JS checks against live data
      const isKnownC = (name) => contacts.some(c =>
        c.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]) ||
        name.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
      );
      const isKnownO = (name) => opps.some(o =>
        o.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]) ||
        name.toLowerCase().includes(o.name.toLowerCase().split(' ')[0])
      );
      // Filter contact/opp updates to only ones that actually match live data
      if (plan.contactUpdates) {
        plan.contactUpdates = plan.contactUpdates.filter(cu => isKnownC(cu.contactName));
      }
      if (plan.opportunityUpdates) {
        plan.opportunityUpdates = plan.opportunityUpdates.filter(ou => isKnownO(ou.oppName));
      }

      const upd0 = [...ags];
      upd0[0] = {...upd0[0], status:'done', detail:`Routing to ${[plan.routeMemory&&'memory',plan.routeCRM&&'CRM'].filter(Boolean).join(' + ')||'nothing'}`};
      setOrchAgents([...upd0]);

      // Memory agent
      let savedCount = 0;
      let updMems = [...memories];
      if (plan.routeMemory && plan.memories?.length) {
        upd0[1] = {...upd0[1], status:'running', detail:`Saving ${plan.memories.length} insights...`};
        setOrchAgents([...upd0]);
        const entries = plan.memories.map(text=>({id:Date.now()+Math.random(),text,timestamp:new Date().toISOString(),agent:'orchestrator'}));
        updMems = [...memories, ...entries];
        setMemories(updMems);
        await sSet(SK.memory, updMems);
        savedCount = entries.length;
      }
      upd0[1] = {...upd0[1], status:'done', detail: savedCount ? `${savedCount} memories saved` : 'No new memories'};
      setOrchAgents([...upd0]);

      // CRM agent
      let crmUpdates = [];
      let updContacts = [...contacts];
      let updOpps = [...opps];
      let updIxs = [...interactions];
      if (plan.routeCRM && plan.contactUpdates?.length) {
        upd0[2] = {...upd0[2], status:'running', detail:`Updating ${plan.contactUpdates.length} contact(s)...`};
        setOrchAgents([...upd0]);

        for (const cu of plan.contactUpdates) {
          const ix = {
            id:Date.now()+Math.random(), type:orchSrc, date:new Date().toISOString(),
            summary:cu.summary, sentiment:cu.sentiment||'neutral',
            keyInsights:cu.keyInsights||[], nextAction:cu.nextAction||'',
            contactUpdate:cu.situationUpdate||null,
            contactIds:[], oppIds:[],
            source:'orchestrator'
          };
          const idx = updContacts.findIndex(c=>
            c.name.toLowerCase().includes(cu.contactName.toLowerCase().split(' ')[0])||
            cu.contactName.toLowerCase().includes(c.name.toLowerCase().split(' ')[0])
          );
          if (idx>=0) {
            ix.contactIds = [updContacts[idx].id];
            updContacts[idx] = {
              ...updContacts[idx],
              lastContact:new Date().toISOString().split('T')[0],
              nextAction:cu.nextAction||updContacts[idx].nextAction,
              interactionIds:[ix.id,...(updContacts[idx].interactionIds||[])]
            };
            crmUpdates.push({name:cu.contactName,sentiment:cu.sentiment});
          }
          updIxs.push(ix);
        }
        for (const ou of (plan.opportunityUpdates||[])) {
          const idx = updOpps.findIndex(o=>o.name.toLowerCase().includes(ou.oppName.toLowerCase().split(' ')[0]));
          if (idx>=0) {
            updOpps[idx] = {
              ...updOpps[idx],
              stage:ou.stageUpdate||updOpps[idx].stage,
              nextAction:ou.nextAction||updOpps[idx].nextAction,
              notes:ou.notes?updOpps[idx].notes+'\n\n'+new Date().toLocaleDateString()+': '+ou.notes:updOpps[idx].notes
            };
          }
        }
        setContacts(updContacts); setOpps(updOpps);
        if (updIxs.length > interactions.length) {
          const finalIxs = updIxs.slice(0, 5000);
          setInteractions(finalIxs);
          await sSet(SK.interactions, finalIxs);
        }
        await sSet(SK.contacts, updContacts);
        await sSet(SK.opps, updOpps);
      }
      upd0[2] = {...upd0[2], status:'done', detail:crmUpdates.length?`${crmUpdates.length} update(s) written`:'No CRM updates'};
      setOrchAgents([...upd0]);

      const logEntry = {
        id:Date.now(), timestamp:new Date().toISOString(), source:orchSrc,
        summary:plan.summary, contactsInvolved:plan.contactsInvolved||[],
        opportunitiesInvolved:plan.opportunitiesInvolved||[],
        memoriesSaved:savedCount, crmUpdates, adhocInsight:plan.adhocInsight||null
      };
      const newLog = [logEntry,...orchLog].slice(0,50);
      setOrchLog(newLog); await sSet(SK.log, newLog);
      setOrchResult({plan, crmUpdates, savedCount});
      setOrchInput('');
    } catch(e) {
      setOrchAgents(prev=>prev.map(a=>a.status==='running'?{...a,status:'error',detail:'Failed'}:a));
    } finally { setOrching(false); }
  };

  // ── SAVE EDIT contact or opp
  const saveEdit = async () => {
    if (detail?.type === 'contact') {
      const updated = contacts.map(c => c.id === detail.item.id ? {...c, ...editData} : c);
      setContacts(updated); await sSet(SK.contacts, updated);
      setDetail({...detail, item: {...detail.item, ...editData}});
    } else if (detail?.type === 'opp') {
      const updated = opps.map(o => o.id === detail.item.id ? {...o, ...editData} : o);
      setOpps(updated); await sSet(SK.opps, updated);
      setDetail({...detail, item: {...detail.item, ...editData}});
    }
    setEditing(false);
  };

  const startEdit = () => {
    setEditData(detail.type === 'contact'
      ? {name:detail.item.name,company:detail.item.company,role:detail.item.role,geography:detail.item.geography,priority:detail.item.priority,relationship:detail.item.relationship,nextAction:detail.item.nextAction,notes:detail.item.notes}
      : {name:detail.item.name,stage:detail.item.stage,probability:detail.item.probability,expectedValue:detail.item.expectedValue,cltv:detail.item.cltv,whereIsBall:detail.item.whereIsBall,proposition:detail.item.proposition,nextAction:detail.item.nextAction,notes:detail.item.notes}
    );
    setEditing(true);
  };

  // ── ADD new contact
  const addContact = async () => {
    if (!newContactData.name.trim()) return;
    const c = {...newContactData, id:'c'+Date.now(), lastContact:new Date().toISOString().split('T')[0], opportunityIds:[], interactions:[]};
    const updated = [...contacts, c]; setContacts(updated); await sSet(SK.contacts, updated);
    setShowAddContact(false); setNewContactData({name:'',company:'',role:'',geography:'',priority:'medium',relationship:'',nextAction:'',notes:''});
  };

  // ── ADD new opp
  const addOpp = async () => {
    if (!newOppData.name.trim()) return;
    const o = {...newOppData, id:'o'+Date.now(), contactIds:[], interactions:[], cltv:Number(newOppData.cltv)||0, expectedValue:Number(newOppData.expectedValue)||0, probability:Number(newOppData.probability)||0};
    const updated = [...opps, o]; setOpps(updated); await sSet(SK.opps, updated);
    setShowAddOpp(false); setNewOppData({name:'',proposition:'',geography:'',stage:'1 - Prospect',probability:10,cltv:0,expectedValue:0,whereIsBall:'Ball in our court',nextAction:'',notes:''});
  };

  // ── UPDATE project
  const updateProject = async (id, changes) => {
    const updated = projects.map(p => p.id===id ? {...p,...changes} : p);
    setProjects(updated); await sSet(SK.projects, updated);
  };

  const addProject = async (name) => {
    if (!name.trim()) return;
    const p = {id:'p'+Date.now(),name:name.trim(),status:'not_started',priority:'medium',notes:'',nextAction:''};
    const updated = [...projects, p]; setProjects(updated); await sSet(SK.projects, updated);
  };
  const deleteMem = async id => {
    const u = memories.filter(m=>m.id!==id);
    setMemories(u); await sSet(SK.memory, u);
  };
  const addMem = async () => {
    if (!newMem.trim()) return;
    const e = {id:Date.now(),text:newMem.trim(),timestamp:new Date().toISOString(),agent:'manual'};
    const u = [...memories, e]; setMemories(u); await sSet(SK.memory, u); setNewMem('');
  };
  const importSession = async () => {
    if (!importText.trim()||importing) return;
    setImporting(true); setImportRes(null);
    const chunks = []; const cs = 1500;
    for (let i=0;i<importText.length;i+=cs) chunks.push(importText.slice(i,i+cs));
    const all = [];
    try {
      for (let i=0;i<chunks.length;i++) {
        setImportRes({status:'progress',msg:`Processing ${i+1}/${chunks.length}...`});
        const raw = await apiCall(M.fast,
          `Extract memories from session content. Return ONLY JSON array of concise third-person strings (max 25 words each). Min 10 if rich content. No markdown.`,
          `Part ${i+1}/${chunks.length}:\n${chunks[i]}`, 1000);
        const ex = parseJ(raw)||[];
        ex.forEach(item=>{
          const text = typeof item === 'string' ? item.trim() : typeof item === 'object' && item !== null ? (item.text||item.content||JSON.stringify(item)) : String(item);
          if (text) all.push({id:Date.now()+Math.random(),text,timestamp:new Date().toISOString(),agent:'session-import'});
        });
        if (i<chunks.length-1) await new Promise(r=>setTimeout(r,400));
      }
      if (all.length>0) {
        const u=[...memories,...all]; setMemories(u); await sSet(SK.memory,u);
        setImportRes({status:'ok',count:all.length}); setImportText('');
      } else { setImportRes({status:'empty'}); }
    } catch(e) { setImportRes({status:'error',msg:e.message}); }
    finally { setImporting(false); }
  };

  // Follow-up list
  const followups = [...contacts]
    .filter(c=>c.nextAction&&!c.nextAction.toLowerCase().startsWith('nothing until')&&c.priority!=='low')
    .sort((a,b)=>(prio[a.priority]??3)-(prio[b.priority]??3)||daysSince(b.lastContact)-daysSince(a.lastContact));

  const agent = coachMode;
  const agentLabel = coachMode==='taskbreaker'?'agent #2 · task breaker':coachMode==='braindump'?'agent #3 · brain dump':'agent #1 · personal coach';
  const agentGlyph = '◎';
  const agentTagline = 'Your thinking partner. Always in your corner.';
  const agentStarters = coachMode==='taskbreaker'
    ? ["A report I've needed to write for weeks — I can't start.","An email I keep opening then closing without replying.","A conversation I've been putting off."]
    : coachMode==='braindump'
    ? ["Just let me dump everything — don't judge me.","My head is full and I don't know what matters today.","I have 40 things, 3 deadlines, family stuff — I'm stuck."]
    : ["What's on my mind right now? Let me tell you.","I can focus for hours on things I love but can't start what matters — why?","I have something important due and I can't seem to begin."];

  if (!loaded) return (
    <><style>{CSS}</style>
    <div className="app" style={{alignItems:'center',justifyContent:'center'}}>
      <div style={{fontFamily:'var(--fm)',color:'var(--text-muted)',fontSize:'12px'}}>Loading SAFWAI Sidekick...</div>
    </div></>
  );

  // ── CONTACT DETAIL
  if (detail?.type==='contact') {
    const c = detail.item;
    const cOpps = opps.filter(o=>o.contactIds?.includes(c.id));
    return (
      <><style>{CSS}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-row">
            <div className="dot"/>
            <div><div className="hdr-title">SAFWAI <em>Sidekick</em></div><div className="hdr-sub">contact detail</div></div>
            <DohaClock/>
          </div>
        </div>
        <div className="scroll">
          <div className="detail fade">
            <button className="back" onClick={()=>{setDetail(null);setEditing(false);setTab(previousTab);}}>← back</button>
            <div className="dcard">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
                <div>
                  <div className="dname">{c.name}</div>
                  <div className="drole">{c.role} · {c.company} · {c.geography}</div>
                </div>
                <button className="edit-btn" onClick={startEdit}>✎ Edit</button>
              </div>
              <div style={{display:'flex',gap:'6px',marginTop:'9px',flexWrap:'wrap'}}>
                <span className="tag" style={{color:prioCol[c.priority],borderColor:prioCol[c.priority]+'44'}}>{c.priority}</span>
                <span className="tag" style={{color:'var(--text-muted)',borderColor:'var(--border)'}}>last contact {daysSince(c.lastContact)}d ago</span>
              </div>
            </div>

            {editing && (
              <div className="edit-form fade">
                <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>Editing Contact</div>
                <div className="ef-row">
                  <div className="ef-field"><div className="ef-label">Name</div><input className="ef-input" value={editData.name||''} onChange={e=>setEditData({...editData,name:e.target.value})}/></div>
                  <div className="ef-field"><div className="ef-label">Company</div><input className="ef-input" value={editData.company||''} onChange={e=>setEditData({...editData,company:e.target.value})}/></div>

                <div className="ef-row">
                  <div className="ef-field"><div className="ef-label">Role</div><input className="ef-input" value={editData.role||''} onChange={e=>setEditData({...editData,role:e.target.value})}/></div>
                  <div className="ef-field"><div className="ef-label">Geography</div><input className="ef-input" value={editData.geography||''} onChange={e=>setEditData({...editData,geography:e.target.value})}/></div>
                </div>
                <div className="ef-field"><div className="ef-label">Priority</div>
                  <select className="ef-select" value={editData.priority||'medium'} onChange={e=>setEditData({...editData,priority:e.target.value})}>

                <div className="ef-field"><div className="ef-label">Notes</div><textarea className="ef-textarea" style={{minHeight:'80px'}} value={editData.notes||''} onChange={e=>setEditData({...editData,notes:e.target.value})}/></div>
                <div className="ef-actions">
                  <button className="save-btn" onClick={saveEdit}>Save</button>
                  <button className="cancel-btn" onClick={()=>setEditing(false)}>Cancel</button>
                </div>
              </div>
            )}
            <div className="dcard">
              <div className="fg"><div className="fl">Relationship</div><div className="fv">{c.relationship||'—'}</div></div>
              <div className="fg"><div className="fl">Notes</div><div className="fv">{c.notes||'—'}</div></div>
              <div style={{marginBottom:0}}><div className="fl">Next Action</div><div className="fv" style={{color:'var(--accent)'}}>{c.nextAction||'—'}</div></div>
            </div>
            {cOpps.length>0&&(
              <div className="dcard">
                <div className="fl" style={{marginBottom:'8px'}}>Linked Opportunities</div>
                {cOpps.map(o=>(
                  <div key={o.id} style={{padding:'8px 10px',background:'var(--surface2)',borderRadius:'7px',border:'1px solid var(--border)',cursor:'pointer',marginBottom:'5px'}}

                    <div style={{fontSize:'12.5px',fontWeight:600}}>{o.name}</div>
                    <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--text-dim)',marginTop:'2px'}}>{o.stage} · {o.expectedValue>0?'$'+o.expectedValue.toLocaleString()+' exp':'TBD'}</div>
                  </div>
                ))}
              </div>
            )}
            <div className="logpanel">
              <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>Log Interaction</div>
              <div className="ltabs">
                <button className={`ltab ${logMode==='manual'?'on':''}`} onClick={()=>setLogMode('manual')}>Manual note</button>
                <button className={`ltab ${logMode==='paste'?'on':''}`} onClick={()=>setLogMode('paste')}>Paste → AI extract</button>
              </div>
              <div style={{display:'flex',gap:'6px'}}>
                {['call','whatsapp','email','meeting','note'].map(t=>(
                  <button key={t} className={`ltab ${logType===t?'on':''}`} onClick={()=>setLogType(t)}>{t}</button>
                ))}
              </div>
              <textarea className="lta" value={logText} onChange={e=>setLogText(e.target.value)}

                <button className="lbtn" onClick={logInteraction} disabled={!logText.trim()||logLoading}>

            {/* Interaction History — from global store + backward compat embedded */}
            {(()=>{

              const allIxs = [...globalIxs, ...embeddedIxs].sort((a,b)=>new Date(b.date)-new Date(a.date));
              if (allIxs.length===0) return null;
              return (
                <div>
                  <div className="section-title" style={{fontSize:'14px',marginBottom:'8px'}}>Interaction History <span>{allIxs.length} logged</span></div>

                    <div key={i.id} className="ientry">
                      <div className="imeta">
                        <span className="itype">{i.type}</span>
                        <span className="idate">{new Date(i.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',timeZone:'Asia/Qatar'})}</span>

                      </div>
                      <div className="isum">{i.summary}</div>
                      {(i.keyInsights||[]).map((ins,j)=><div key={j} className="iins">{ins}</div>)}
                      {i.nextAction&&<div className="inext">→ {i.nextAction}</div>}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        </div>
      </div></>
    );
  }

  // ── OPP DETAIL
  if (detail?.type==='opp') {
    const o = detail.item;
    const oc = contacts.filter(c=>o.contactIds?.includes(c.id));
    return (
      <><style>{CSS}</style>
      <div className="app">
        <div className="hdr">
          <div className="hdr-row">
            <div className="dot"/>
            <div><div className="hdr-title">SAFWAI <em>Sidekick</em></div><div className="hdr-sub">opportunity detail</div></div>
            <DohaClock/>
          </div>
        </div>
        <div className="scroll">
          <div className="detail fade">
            <button className="back" onClick={()=>{setDetail(null);setEditing(false);setTab(previousTab);}}>← back</button>
            <div className="dcard">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
                <div className="dname">{o.name}</div>
                <button className="edit-btn" onClick={startEdit}>✎ Edit</button>
              </div>
              <div style={{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}}>
                <span className="tag" style={{color:stageCol[o.stage]||'var(--text-muted)',borderColor:(stageCol[o.stage]||'var(--text-muted)')+'44'}}>{o.stage}</span>
                {o.expectedValue>0&&<span className="tag" style={{color:'var(--accent)',borderColor:'var(--accent-dim)'}}>${o.expectedValue.toLocaleString()} exp</span>}
                {o.cltv>0&&<span className="tag" style={{color:'var(--gold)',borderColor:'var(--gold)44'}}>${o.cltv.toLocaleString()} CLTV</span>}
                <span className="tag" style={{color:'var(--text-muted)',borderColor:'var(--border)'}}>{o.probability}%</span>
                {o.whereIsBall&&<span className="tag" style={{color:o.whereIsBall==='Ball in our court'?'var(--accent)':'var(--text-muted)',borderColor:o.whereIsBall==='Ball in our court'?'var(--accent-dim)':'var(--border)'}}>{o.whereIsBall==='Ball in our court'?'⚡ Our court':o.whereIsBall==='Meeting planned'?'📅 Meeting':'⏳ Their court'}</span>}
              </div>
            </div>

            {editing && (
              <div className="edit-form fade">
                <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>Editing Opportunity</div>
                <div className="ef-field"><div className="ef-label">Name</div><input className="ef-input" value={editData.name||''} onChange={e=>setEditData({...editData,name:e.target.value})}/></div>
                <div className="ef-row">
                  <div className="ef-field"><div className="ef-label">Stage</div>
                    <select className="ef-select" value={editData.stage||'1 - Prospect'} onChange={e=>setEditData({...editData,stage:e.target.value})}>
                      {['0 - Not qualified','1 - Prospect','2 - Exploring','3 - Meeting planned','4 - Qualified','5 - RFP received','6 - Proposed','9 - Lost / Rekindle','9 - Lost'].map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="ef-field"><div className="ef-label">Probability %</div><input className="ef-input" type="number" min="0" max="100" value={editData.probability||0} onChange={e=>setEditData({...editData,probability:Number(e.target.value)})}/></div>
                </div>
                <div className="ef-row">
                  <div className="ef-field"><div className="ef-label">Expected Value $</div><input className="ef-input" type="number" value={editData.expectedValue||0} onChange={e=>setEditData({...editData,expectedValue:Number(e.target.value)})}/></div>
                  <div className="ef-field"><div className="ef-label">CLTV $</div><input className="ef-input" type="number" value={editData.cltv||0} onChange={e=>setEditData({...editData,cltv:Number(e.target.value)})}/></div>
                </div>
                <div className="ef-field"><div className="ef-label">Where is the ball?</div>
                  <select className="ef-select" value={editData.whereIsBall||'Ball in their court'} onChange={e=>setEditData({...editData,whereIsBall:e.target.value})}>
                    <option>Ball in our court</option><option>Ball in their court</option><option>Meeting planned</option>
                  </select>
                </div>
                <div className="ef-field"><div className="ef-label">Next Action</div><input className="ef-input" value={editData.nextAction||''} onChange={e=>setEditData({...editData,nextAction:e.target.value})}/></div>
                <div className="ef-field"><div className="ef-label">Notes</div><textarea className="ef-textarea" style={{minHeight:'70px'}} value={editData.notes||''} onChange={e=>setEditData({...editData,notes:e.target.value})}/></div>
                <div className="ef-actions">
                  <button className="save-btn" onClick={saveEdit}>Save</button>
                  <button className="cancel-btn" onClick={()=>setEditing(false)}>Cancel</button>
                </div>
              </div>
            )}
            <div className="dcard">
              <div className="fg"><div className="fl">Proposition</div><div className="fv">{o.proposition||'—'}</div></div>
              {o.leadSource&&<div className="fg"><div className="fl">Lead Source</div><div className="fv">{o.leadSource}</div></div>}
              <div className="fg"><div className="fl">Notes</div><div className="fv">{o.notes||'—'}</div></div>
              <div style={{marginBottom:0}}><div className="fl">Next Action</div><div className="fv" style={{color:'var(--accent)'}}>{o.nextAction||'—'}</div></div>
            </div>
            {oc.length>0&&(
              <div className="dcard">
                <div className="fl" style={{marginBottom:'8px'}}>Linked Contacts</div>
                {oc.map(c=>(
                  <div key={c.id} style={{padding:'8px 10px',background:'var(--surface2)',borderRadius:'7px',border:'1px solid var(--border)',cursor:'pointer',marginBottom:'5px'}}
                    onClick={()=>{setPreviousTab(tab);setDetail({type:'contact',item:c});}}>
                    <div style={{fontSize:'12.5px',fontWeight:600}}>{c.name}</div>
                    <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--text-dim)',marginTop:'2px'}}>{c.role} · {c.company}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div></>
    );
  }

  /* ════════════════════════════════════════════════════════════
     MAIN LAYOUT
  ════════════════════════════════════════════════════════════ */
  return (
    <><style>{CSS}</style>
    <div className="app" style={{colorScheme:'light',background:'#f4f1ed',color:'#1a1512'}}>

      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-row">
          <div className="dot"/>
          <div>
            <div className="hdr-title">SAFWAI <em>Sidekick</em></div>
            <div className="hdr-sub">personal coach · pipeline · memory · {contacts.length} contacts · {memories.length} insights</div>
          </div>
          <DohaClock/>
        </div>
      </div>

      {/* NAV */}
      <div className="nav">
        <button className={`nb ${tab==='coach'?'on':''}`} onClick={()=>setTab('coach')}>◎ Coach</button>
        <button className={`nb ${tab==='kanban'?'on':''}`} onClick={()=>setTab('kanban')}>⊞ Actions ({kanban.filter(c=>c.col!=='done').length})</button>
        <button className={`nb ${tab==='contacts'?'on':''}`} onClick={()=>setTab('contacts')}>👤 Contacts</button>
        <button className={`nb ${tab==='pipeline'?'on':''}`} onClick={()=>setTab('pipeline')}>💼 Pipeline</button>
        <button className={`nb ${tab==='activity'?'on':''}`} onClick={()=>setTab('activity')}>📅 Activity ({interactions.length})</button>
        <button className={`nb ${tab==='projects'?'on':''}`} onClick={()=>setTab('projects')}>📋 Projects ({projects.length})</button>
        <button className={`nb blu ${tab==='inbox'?'on':''}`} onClick={()=>setTab('inbox')}>⚡ Inbox</button>
        <button className={`nb grn ${tab==='memory'?'on':''}`} onClick={()=>setTab('memory')}>🧠 Memory ({memories.length})</button>
        <button className={`nb ${tab==='log'?'on':''}`} onClick={()=>setTab('log')}>🗂 Log</button>
      </div>

      {/* ── COACH TAB ── */}
      {tab==='coach'&&(
        <>
          <div className="scroll">
            {messages.length===0?(
              <div className="welcome">
                <div className="wglyph">{agentGlyph}</div>
                <div className="wline">{agentTagline}</div>
                {memories.length>0&&<div style={{fontFamily:'var(--fm)',fontSize:'11px',color:'var(--green)'}}>◉ {memories.length} memories loaded · CRM synced</div>}

                  {agentStarters.map((s,i)=><button key={i} className="starter" onClick={()=>send(s)}>{s}</button>)}
                </div>
              </div>
            ):(
              <>
                {messages.map((m,i)=>(
                  <div key={i} className={`msg ${m.role==='user'?'u':'a'}`}>
                    <div className="mlabel">{m.role==='user'?'you':agentLabel}</div>
                    <div className="bubble">{m.role==='assistant'?renderMd(m.content):m.content}</div>
                  </div>
                ))}
                {loading&&(
                  <div className="msg a">
                    <div className="mlabel">{agentLabel}</div>
                    <div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div>
                  </div>
                )}
                {memToast&&<div className="mem-toast">◉ memory updated</div>}
                {orchToast&&<div className="orch-toast">◉ {orchToast}</div>}

                {/* ── INLINE ACTIVITY LOGGER — only appears when auto-detected or explicitly triggered ── */}
                {pendingActivity&&(
                  <div className="nc-suggest fade" style={{flexDirection:'column',gap:'8px'}}>
                    <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>Log Activity</div>
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                      <input className="ef-input" style={{flex:1,minWidth:'130px',fontSize:'13px',padding:'7px 10px'}}
                        placeholder="Contact name" id="act-contact"
                        defaultValue={pendingActivity.contactName||''}/>
                      <select className="ef-select" style={{fontSize:'12px',padding:'7px 10px'}} id="act-type"
                        defaultValue={pendingActivity.type||'note'}>
                        <option value="call">📞 Call</option>
                        <option value="meeting">🤝 Meeting</option>
                        <option value="email">✉️ Email</option>
                        <option value="whatsapp">💬 WhatsApp</option>
                        <option value="note">📝 Note</option>
                      </select>
                    </div>
                    <input className="ef-input" style={{fontSize:'13px',padding:'7px 10px'}}
                      placeholder="What happened?" id="act-desc"
                      defaultValue={pendingActivity.description||''}/>
                    <div style={{display:'flex',gap:'7px'}}>
                      <button className="nc-yes" style={{flex:1}} onClick={()=>{
                        const desc = document.getElementById('act-desc')?.value||'';
                        const contact = document.getElementById('act-contact')?.value||'';
                        const type = document.getElementById('act-type')?.value||'note';
                        if (desc.trim()) quickLogActivity(desc, contact, type);
                        else setPendingActivity(null);
                      }}>+ Save Activity</button>
                      <button className="nc-no" onClick={()=>setPendingActivity(null)}>Cancel</button>
                    </div>
                  </div>
                )}

                {/* ── INLINE CONTACT QUEUE ── */}
                {newContactSuggestion&&newContactSuggestion.names.length>0&&(
                  <div className="nc-suggest fade" style={{flexDirection:'column',alignItems:'stretch',gap:'10px'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <div className="nc-text" style={{flex:1}}>
                        Add <strong style={{color:'var(--gold)'}}>{newContactSuggestion.names[0]}</strong> to your CRM?
                        {newContactSuggestion.names.length>1&&<span style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--text-muted)',marginLeft:'6px'}}>{newContactSuggestion.names.length-1} more after this</span>}
                      </div>
                      <button className="nc-no" onClick={()=>setNewContactSuggestion(null)}>Skip all</button>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                      <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                        <input className="ef-input" style={{flex:1,minWidth:'140px',fontSize:'13px',padding:'7px 10px'}}
                          placeholder="Company (optional)" id="nc-company"/>
                        <input className="ef-input" style={{flex:1,minWidth:'120px',fontSize:'13px',padding:'7px 10px'}}
                          placeholder="Role (optional)" id="nc-role"/>
                      </div>
                      <input className="ef-input" style={{fontSize:'13px',padding:'7px 10px'}}
                        placeholder="Geography (optional)" id="nc-geo"/>
                      <input className="ef-input" style={{fontSize:'13px',padding:'7px 10px'}}
                        placeholder="Quick note — how you know them, context... (optional)" id="nc-notes"/>
                    </div>
                    <div style={{display:'flex',gap:'7px'}}>
                      <button className="nc-yes" style={{flex:1}} onClick={async()=>{
                        const company = document.getElementById('nc-company')?.value||'';
                        const role = document.getElementById('nc-role')?.value||'';
                        const geography = document.getElementById('nc-geo')?.value||'';
                        const notes = document.getElementById('nc-notes')?.value||'';
                        const c = {
                          id:'c'+Date.now(),
                          name:newContactSuggestion.names[0],
                          company, role, geography,
                          priority:'medium',
                          lastContact:new Date().toISOString().split('T')[0],
                          nextAction:'', relationship:'', notes,
                          opportunityIds:[], interactionIds:[], interactions:[]
                        };
                        const updated=[...contacts,c];
                        setContacts(updated);
                        await sSet(SK.contacts,updated);
                        const remaining = newContactSuggestion.names.slice(1);
                        if (remaining.length>0) {
                          setNewContactSuggestion({names:remaining});
                          ['nc-company','nc-role','nc-geo','nc-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
                        } else {
                          setNewContactSuggestion(null);
                        }
                        setOrchToast(`✓ ${c.name} added to contacts`);
                        setTimeout(()=>setOrchToast(''),3000);
                      }}>+ Save {newContactSuggestion.names[0].split(' ')[0]}</button>
                      <button className="nc-no" onClick={()=>{
                        const remaining = newContactSuggestion.names.slice(1);
                        remaining.length>0 ? setNewContactSuggestion({names:remaining}) : setNewContactSuggestion(null);
                      }}>Skip</button>
                    </div>
                  </div>
                )}

                {/* ── INLINE OPP SUGGESTION ── */}
                {newOppSuggestion&&(
                  <div className="nc-suggest fade">
                    <div className="nc-text">
                      New opportunity: <strong style={{color:'var(--gold)'}}>{newOppSuggestion.name}</strong> — add to pipeline?
                    </div>
                    <button className="nc-yes" onClick={async()=>{
                      const o = {
                        id:'o'+Date.now(),
                        name:newOppSuggestion.name,
                        proposition:'', geography:'',
                        stage:'1 - Prospect', probability:10,
                        cltv:0, expectedValue:0,
                        whereIsBall:'Ball in our court',
                        nextAction:'', notes:'',
                        contactIds:[], interactions:[]
                      };
                      const updated=[...opps,o];
                      setOpps(updated);
                      await sSet(SK.opps,updated);
                      setNewOppSuggestion(null);
                      setOrchToast(`✓ ${o.name} added to pipeline`);
                      setTimeout(()=>setOrchToast(''),3000);
                    }}>+ Add</button>
                    <button className="nc-no" onClick={()=>setNewOppSuggestion(null)}>Dismiss</button>
                  </div>
                )}
              </>
            )}
            <div ref={bottomRef}/>
          </div>
          <div className="input-area">
            <div className="input-row">
              <textarea ref={taRef} className="ta" value={input}
                onChange={e=>{setInput(e.target.value);resize();}}
                onKeyDown={onKey}
                placeholder="Talk to your coach, share an email, ask about a contact... CRM + memory update automatically."
                rows={1}/>
              <button className="send" onClick={()=>send()} disabled={!input.trim()||loading}>→</button>
            </div>
            <div className="irow2">
              {messages.length>0&&<button className="clr-btn" onClick={async()=>{
                setMessages([]);
                await saveChat('coach', []);
              }}>clear conversation</button>}
              <button style={{marginLeft:'auto',background:'none',border:'none',color:'var(--text-muted)',fontFamily:'var(--fm)',fontSize:'10px',cursor:'pointer',padding:'5px'}}
                onClick={()=>setPendingActivity({description:'',contactName:'',type:'note'})}>
                + log activity
              </button>
            </div>
          </div>
        </>
      )}

      {/* ── KANBAN / ACTIONS TAB ── */}
      {tab==='kanban'&&(
        <KanbanTab kanban={kanban} setKanban={setKanban} contacts={contacts} opps={opps}
          setPreviousTab={setPreviousTab} setDetail={setDetail} setEditing={setEditing}/>
      )}



      {tab==='contacts'&&(
        <div className="scroll fade">
          <div className="section-title">Contacts <span>{contacts.length} people</span></div>

          {showAddContact ? (
            <div className="edit-form">
              <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>New Contact</div>
              <div className="ef-row">
                <div className="ef-field"><div className="ef-label">Name *</div><input className="ef-input" value={newContactData.name} onChange={e=>setNewContactData({...newContactData,name:e.target.value})} placeholder="Full name"/></div>
                <div className="ef-field"><div className="ef-label">Company</div><input className="ef-input" value={newContactData.company} onChange={e=>setNewContactData({...newContactData,company:e.target.value})} placeholder="Company"/></div>
              </div>
              <div className="ef-row">
                <div className="ef-field"><div className="ef-label">Role</div><input className="ef-input" value={newContactData.role} onChange={e=>setNewContactData({...newContactData,role:e.target.value})} placeholder="Role"/></div>
                <div className="ef-field"><div className="ef-label">Geography</div><input className="ef-input" value={newContactData.geography} onChange={e=>setNewContactData({...newContactData,geography:e.target.value})} placeholder="Country / City"/></div>

                  storageKeys: SK,
                  memories, contacts, opps, projects, orchLog, interactions, chats: savedChats, kanban
                };
                const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});

                a.download = `safwai-sidekick-backup-${new Date().toISOString().split('T')[0]}.json`;

                    if (backup.memories) { setMemories(backup.memories); await sSet(SK.memory, backup.memories); }
                    if (backup.contacts) { setContacts(backup.contacts); await sSet(SK.contacts, backup.contacts); }

          <div style={{display:'flex',gap:'7px',marginTop:'4px'}}>
            <input className="minput" value={newMem} onChange={e=>setNewMem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMem()} placeholder="Add memory manually..."/>
            <button className="mabtn" onClick={addMem} disabled={!newMem.trim()}>+ Save</button>
          </div>
          <div className="import-box">
            <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px'}}>Session Import — AI Agent (Haiku 4.5)</div>
            <div style={{fontSize:'12px',color:'var(--text-dim)',lineHeight:'1.5'}}>Paste a conversation summary, notes, or any context. AI extracts all memories automatically.</div>
            <textarea className="ita" value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Paste session summary here..."/>
            <button className="mabtn" style={{background:'var(--accent-glow)',borderColor:'var(--accent-dim)',color:'var(--accent)'}} onClick={importSession} disabled={importing||!importText.trim()}>
              {importing?`${importRes?.msg||'Processing...'}`:'→ Extract & Save Memories'}
            </button>
            {importRes?.status==='ok'&&<div style={{fontFamily:'var(--fm)',fontSize:'11px',color:'var(--green)'}}>◉ {importRes.count} memories extracted and saved.</div>}
            {importRes?.status==='error'&&<div style={{fontFamily:'var(--fm)',fontSize:'11px',color:'var(--red)'}}>✕ {importRes.msg}</div>}
          </div>
        </div>
      )}

      {/* ── LOG TAB ── */}
      {tab==='log'&&(
        <div className="scroll fade">
          <div className="section-title">Orchestration Log <span>{orchLog.length} entries</span></div>
          {orchLog.length===0
            ?<div className="empty">No orchestrations yet.</div>
            :orchLog.map(e=>(
              <div key={e.id} className="lentry">
                <div className="lmeta">
                  <span className="ltime">{new Date(e.timestamp).toLocaleString('en-GB',{timeZone:'Asia/Qatar',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                  <span className="ltype">{e.source}</span>
                  {e.memoriesSaved>0&&<span style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--green)'}}>◉ {e.memoriesSaved} mem</span>}
                  {e.crmUpdates?.length>0&&<span style={{fontFamily:'var(--fm)',fontSize:'9px',color:'var(--blue)'}}>◉ {e.crmUpdates.length} crm</span>}
                </div>
                <div className="lsum">{e.summary}</div>
                {e.adhocInsight&&<div style={{fontFamily:'var(--fd)',fontSize:'12px',fontStyle:'italic',color:'var(--text-muted)',marginTop:'4px'}}>💡 {e.adhocInsight}</div>}
                {e.contactsInvolved?.length>0&&(
                  <div style={{display:'flex',gap:'4px',marginTop:'5px',flexWrap:'wrap'}}>
                    {e.contactsInvolved.map((n,i)=><span key={i} className="tag" style={{color:'var(--text-muted)',borderColor:'var(--border)'}}>{n}</span>)}
                  </div>
                )}
              </div>
            ))
          }
        </div>
      )}

    </div></>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SAFWAISidekick/>);
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   SERVICE WORKER — enables PWA install + offline shell
═══════════════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Inline service worker as blob — no separate sw.js file needed
    const swCode = `
      const CACHE = 'safwai-v1';
      self.addEventListener('install', e => {
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(clients.claim());
      });
      // Network-first: always try network, fall back to cache
      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        e.respondWith(
          fetch(e.request)
            .then(r => {
              const clone = r.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return r;
            })
            .catch(() => caches.match(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  });
}
</script>
